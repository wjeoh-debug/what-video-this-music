# Next.js CSR Template - Nginx Configuration
# Action Log API 프록시를 통한 CORS 우회 설정

server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip 압축
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml;

    # 정적 파일 서빙
    location / {
        try_files $uri $uri/ /index.html;

        # 캐싱 헤더
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # 정적 에셋 캐싱 (JS, CSS, 이미지 등)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ============================================
    # Action Log API 프록시 (CORS 우회)
    # ============================================
    #
    # 환경에 따라 아래 proxy_pass를 변경하세요:
    # - Stage/Dev: https://ingestion.qa.log.infra.music-flo.io
    # - Production: https://ingestion.log.infra.music-flo.io
    #
    location /api/action-log/ {
        # Stage 환경 (기본값)
        set $action_log_upstream "https://ingestion.qa.log.infra.music-flo.io";

        # Production 환경으로 전환하려면 위 라인을 아래로 변경:
        # set $action_log_upstream "https://ingestion.log.infra.music-flo.io";

        proxy_pass $action_log_upstream/;

        # 프록시 헤더 설정
        proxy_http_version 1.1;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Content-Type "application/json";

        # SSL 설정 (upstream이 HTTPS인 경우 필수)
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;

        # 타임아웃 설정
        proxy_connect_timeout 10s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;

        # 버퍼 설정
        proxy_buffer_size 4k;
        proxy_buffers 4 32k;
        proxy_busy_buffers_size 64k;
    }

    # 보안 헤더
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 헬스 체크
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
