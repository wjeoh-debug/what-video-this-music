# Next.js CSR Template - Docker Compose
# 로컬 개발 및 테스트용

version: '3.8'

services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: nextjs-csr-app
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      - NGINX_ENVSUBST_OUTPUT_DIR=/etc/nginx/conf.d
